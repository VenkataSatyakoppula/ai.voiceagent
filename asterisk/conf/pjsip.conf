; external_* : use 127.0.0.1 for MicroSIP on the same machine as Docker.
; On a VPS, set ASTERISK_EXTERNAL_IP in .env and run: npm run asterisk:pjsip-external-ip
; (SDP must advertise your public IP or remote phones send RTP to the wrong place.)
[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0
external_media_address=127.0.0.1
external_signaling_address=127.0.0.1
local_net=127.0.0.1/32
local_net=172.20.0.0/24

[endpoint-template](!)
type=endpoint
transport=transport-tcp
context=demo
disallow=all
allow=ulaw,alaw
direct_media=no
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes
media_use_received_transport=yes

[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0
external_media_address=127.0.0.1
external_signaling_address=127.0.0.1
local_net=127.0.0.1/32
local_net=172.20.0.0/24

[webrtc-template](!)
type=endpoint
transport=transport-wss
webrtc=yes
context=demo
message_context=avr-message-context
subscribe_context=avr-subscribe-context
allow_subscribe=yes
device_state_busy_at=1
disallow=all
allow=ulaw,alaw,vp9,vp8,h264

[1000](endpoint-template)
auth=1000
aors=1000

[1000]
type=auth
auth_type=userpass
password=1000
username=1000

[1000]
type=aor
max_contacts=10

[2000](webrtc-template)
auth=2000   
aors=2000

[2000]
type=auth
auth_type=userpass
password=2000
username=2000

[2000]
type=aor
max_contacts=10
